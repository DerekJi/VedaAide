version: '3.8'

services:
  # Bot 核心服务（直连 SQLite，调用 DeepSeek API）
  vedaaide-bot:
    build:
      context: .
      dockerfile: ./bot_app/Dockerfile
    container_name: vedaaide-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DB_PATH=/app/data/vedaaide.db
      - TZ=${TZ:-Asia/Shanghai}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./bot_app:/app
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - vedaaide-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # SQLite Web API（仅本地开发工具，供 view_db.mjs 等脚本使用）
  # 启动方式：docker-compose --profile tools up -d vedaaide-db
  vedaaide-db:
    profiles: ["tools"]
    build:
      context: ./sqlite_app
      dockerfile: Dockerfile
    container_name: vedaaide-db
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - vedaaide-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ChromaDB 向量数据库（后期启用）
  # 启动方式：docker-compose --profile tools up -d chroma
  chroma:
    profiles: ["tools"]
    image: chromadb/chroma:latest
    container_name: chroma
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    # ports:
    #   - "8000:8000"
    restart: unless-stopped
    networks:
      - vedaaide-network
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

networks:
  vedaaide-network:
    driver: bridge

